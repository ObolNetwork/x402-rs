name: Build and Publish Prometheus Overlay Image

on:
  pull_request:
    paths:
      - ".github/workflows/prometheus-overlay-image.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "facilitator/**"
      - "crates/x402-facilitator-local/**"
      - "crates/x402-types/**"
      - "crates/chains/**"
      - "overlays/x402-facilitator-prometheus-overlay/**"
  push:
    branches:
      - main
      - "beta/**"
    tags:
      - "v*"
    paths:
      - ".github/workflows/prometheus-overlay-image.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "facilitator/**"
      - "crates/x402-facilitator-local/**"
      - "crates/x402-types/**"
      - "crates/chains/**"
      - "overlays/x402-facilitator-prometheus-overlay/**"

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKERHUB: docker.io
  IMAGE_NAME: obolnetwork/x402-facilitator-prometheus-overlay
  DOCKERFILE_PATH: overlays/x402-facilitator-prometheus-overlay/Dockerfile

jobs:
  meta:
    name: Overlay Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Define Docker image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/heads/beta/') }}
            type=raw,value=beta-${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/heads/beta/') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=
            type=raw,value=next,event=branch,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.title=x402 Facilitator Prometheus Overlay
            org.opencontainers.image.description=Operator-owned Prometheus overlay for x402 Facilitator
            org.opencontainers.image.vendor=x402-rs
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  test-overlay:
    name: Test Overlay
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run overlay tests
        run: cargo test -p x402-facilitator-prometheus-overlay

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [meta, test-overlay]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: image=moby/buildkit:v0.10.5

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            CARGO_FEATURES=full
          tags: ${{ needs.meta.outputs.tags }}
          labels: ${{ needs.meta.outputs.labels }}
